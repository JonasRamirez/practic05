global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout client 30s
    timeout connect 5s
    timeout server 30s

frontend http_front
    bind *:80
    default_backend apps

backend apps
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200
    server app1 app1:8080 check
    server app2 app2:8080 check
    server app3 app3:8080 check
