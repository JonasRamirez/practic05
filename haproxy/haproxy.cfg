frontend https_front
    bind *:443 ssl crt /etc/ssl/private/domain.pem
    mode http
    option forwardfor
    acl is_ssl hdr(X-Forwarded-Proto) -i https
    http-request redirect scheme https unless is_ssl
    default_backend apps

frontend http_front
    bind *:80
    mode http
    option forwardfor
    acl is_ssl hdr(X-Forwarded-Proto) -i https
    http-request redirect scheme https unless is_ssl
    default_backend apps

backend apps
    balance roundrobin
    option httpchk GET /actuator/health
    cookie SRVID insert indirect nocache
    server app1 app1:8080 check cookie app1
    server app2 app2:8080 check cookie app2
    server app3 app3:8080 check cookie app3
