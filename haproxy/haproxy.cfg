frontend https_front
    bind *:443 ssl crt /etc/ssl/private/domain.pem
    mode http
    default_backend apps

frontend http_front
    bind *:80
    redirect scheme https

backend apps
    balance roundrobin
    server app1 app1:8080 check
    server app2 app2:8080 check
    server app3 app3:8080 check