<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Mocky | Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex">

    <!-- Sidebar izquierdo (igual que en tu proyecto) -->
    <aside class="w-64 bg-slate-200 p-6 flex flex-col justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-800 mb-8">
                Mocky
            </h1>

            <nav class="space-y-3">
                <a th:href="@{/projects}" th:text="#{menu.projects}"
                    class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300">
                </a>

                <a th:href="@{/mocks/new}" th:text="#{menu.newMock}"
                    class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300">
                </a>

                <a th:href="@{/admin/users-view}" th:text="#{menu.users}"
                    class="block px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
                </a>
            </nav>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" th:text="#{menu.logout}"
                class="w-full bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
            </button>
        </form>
    </aside>

    <!-- Contenido principal -->
    <main class="flex-1 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-slate-800">Gestión de Usuarios</h2>
            <a th:href="@{/admin/users-view/new}"
                class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"
                        clip-rule="evenodd" />
                </svg>
                Nuevo Usuario
            </a>
        </div>

        <!-- Grid de usuarios -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="user : ${users}"
                class="bg-white rounded-lg shadow p-5 relative hover:shadow-lg transition-shadow">

                <!-- Header con avatar -->
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center">
                        <span class="text-indigo-600 font-bold text-xl"
                            th:text="${#strings.substring(user.username, 0, 1)}">U</span>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-slate-800" th:text="${user.username}">username</h3>
                        <p class="text-sm text-slate-500">ID: <span th:text="${user.id}">1</span></p>
                    </div>
                </div>

                <!-- Roles -->
                <div class="mb-4">
                    <p class="text-sm text-slate-600 mb-2">Roles:</p>
                    <div class="flex flex-wrap gap-2">
                        <span th:each="role : ${user.roles}"
                            th:classappend="${role.name == 'ADMIN' ? 'bg-red-200 text-red-800' : 'bg-green-200 text-green-800'}"
                            class="px-2 py-1 rounded text-xs font-bold" th:text="${role.name}">
                            ROLE
                        </span>
                        <span th:if="${#lists.isEmpty(user.roles)}" class="text-sm text-slate-400 italic">
                            Sin roles asignados
                        </span>
                    </div>
                </div>

                <!-- Acciones -->
                <div class="flex justify-end gap-3 pt-3 border-t border-slate-200">
                    <a th:href="@{/admin/users-view/view/{id}(id=${user.id})}"
                        class="text-indigo-600 hover:underline text-sm flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                            <path fill-rule="evenodd"
                                d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                                clip-rule="evenodd" />
                        </svg>
                        Ver
                    </a>
                    <a th:href="@{/admin/users-view/edit/{id}(id=${user.id})}"
                        class="text-yellow-600 hover:underline text-sm flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path
                                d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                        </svg>
                        Editar
                    </a>
                    <button type="button" th:data-user-id="${user.id}" th:data-user-name="${user.username}"
                        onclick="confirmDelete(this)"
                        class="text-red-600 hover:underline text-sm flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        Eliminar
                    </button>
                </div>
            </div>
        </div>

        <!-- Mensaje si no hay usuarios -->
        <div th:if="${#lists.isEmpty(users)}" class="text-center text-slate-500 py-12">
            No hay usuarios registrados.
            <a th:href="@{/admin/users-view/new}" class="text-indigo-600 hover:underline">Crear el primer usuario</a>
        </div>
    </main>

    <!-- Modal de confirmación para eliminar -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h3 class="text-xl font-bold text-slate-800 mb-4">Confirmar Eliminación</h3>
            <p class="text-slate-600 mb-2">¿Estás seguro que deseas eliminar al usuario <span id="deleteUsername"
                    class="font-bold"></span>?</p>
            <p class="text-red-600 text-sm mb-6">Esta acción no se puede deshacer.</p>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="hideDeleteModal()"
                    class="px-4 py-2 bg-slate-300 text-slate-700 rounded-lg hover:bg-slate-400">
                    Cancelar
                </button>
                <form id="deleteForm" method="post" th:action="@{/admin/users/{id}(id='__id__')}">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">
                        Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function confirmDelete(button) {
            const userId = button.getAttribute('data-user-id');
            const userName = button.getAttribute('data-user-name');
            document.getElementById('deleteUsername').textContent = userName;
            let form = document.getElementById('deleteForm');
            form.action = '/admin/users/' + userId;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function hideDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
        }

        // Cerrar modal si se hace clic fuera
        window.onclick = function (event) {
            const modal = document.getElementById('deleteModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>

</body>

</html>
