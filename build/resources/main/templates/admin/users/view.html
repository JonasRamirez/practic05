<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mocky | Ver Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex">

<!-- Sidebar izquierdo (igual que en list.html) -->
<aside class="w-64 bg-slate-200 p-6 flex flex-col justify-between">
    <div>
        <h1 class="text-2xl font-bold text-slate-800 mb-8">
            Mocky
        </h1>

        <nav class="space-y-3">
            <a th:href="@{/projects}" th:text="#{menu.projects}"
               class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300">
            </a>

            <a th:href="@{/mocks/new}" th:text="#{menu.newMock}"
               class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300">
            </a>

            <a th:href="@{/admin/users-view}" th:text="#{menu.users}"
               class="block px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
            </a>
        </nav>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" th:text="#{menu.logout}"
                class="w-full bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
        </button>
    </form>
</aside>

<!-- Contenido principal -->
<main class="flex-1 p-8 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-slate-800">Detalles del Usuario</h2>
        <a th:href="@{/admin/users-view}" 
           class="bg-slate-500 text-white px-4 py-2 rounded-lg hover:bg-slate-600 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            Volver
        </a>
    </div>

    <!-- Perfil del usuario -->
    <div class="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-lg shadow p-8 mb-6 text-white">
        <div class="flex items-center gap-6">
            <div class="w-20 h-20 rounded-full bg-white bg-opacity-20 flex items-center justify-center">
                <span class="text-white font-bold text-3xl" 
                      th:text="${#strings.substring(user.username, 0, 1)}">U</span>
            </div>
            <div>
                <h3 class="text-2xl font-bold" th:text="${user.username}">username</h3>
                <p class="text-indigo-100">ID: <span th:text="${user.id}">1</span></p>
            </div>
        </div>
    </div>

    <!-- Roles -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" viewBox="0 0 20 20" fill="currentColor">
                <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" />
            </svg>
            Roles Asignados
        </h3>
        <div class="flex flex-wrap gap-2">
            <span th:each="role : ${user.roles}"
                  th:classappend="${role.name == 'ADMIN' ? 'bg-red-200 text-red-800' : 'bg-green-200 text-green-800'}"
                  class="px-3 py-1 rounded-full text-sm font-bold"
                  th:text="${role.name}">
                ROLE
            </span>
            <span th:if="${#lists.isEmpty(user.roles)}" 
                  class="text-slate-500 italic">
                Este usuario no tiene roles asignados.
            </span>
        </div>
    </div>

    <!-- Acciones -->
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-bold text-slate-800 mb-4">Acciones</h3>
        <div class="flex gap-3">
            <a th:href="@{/admin/users-view/edit/{id}(id=${user.id})}" 
               class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                </svg>
                Editar Usuario
            </a>
            <button type="button" 
                    onclick="confirmDelete('[[${user.id}]]', '[[${user.username}]]')"
                    class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                Eliminar Usuario
            </button>
        </div>
    </div>
</main>

<!-- Modal de confirmación (igual que en list.html) -->
<div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full">
        <h3 class="text-xl font-bold text-slate-800 mb-4">Confirmar Eliminación</h3>
        <p class="text-slate-600 mb-2">¿Estás seguro que deseas eliminar al usuario <span id="deleteUsername" class="font-bold"></span>?</p>
        <p class="text-red-600 text-sm mb-6">Esta acción no se puede deshacer.</p>
        <div class="flex justify-end gap-3">
            <button type="button" onclick="hideDeleteModal()" 
                    class="px-4 py-2 bg-slate-300 text-slate-700 rounded-lg hover:bg-slate-400">
                Cancelar
            </button>
            <form id="deleteForm" method="post" th:action="@{/admin/users/{id}(id='__id__')}">
                <input type="hidden" name="_method" value="DELETE">
                <button type="submit" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">
                    Eliminar
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function confirmDelete(userId, username) {
        document.getElementById('deleteUsername').textContent = username;
        let form = document.getElementById('deleteForm');
        form.action = '/admin/users/' + userId;
        document.getElementById('deleteModal').style.display = 'flex';
    }

    function hideDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('deleteModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>
