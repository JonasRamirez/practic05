spring.application.name=practica5
server.port=${APP_PORT:8080}

spring.datasource.url=${APP_DB_URL:jdbc:h2:file:${APP_DB_PATH:./data/practica5db};MODE=${APP_DB_MODE:PostgreSQL};AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${APP_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${APP_DB_USERNAME:admin}
spring.datasource.password=${APP_DB_PASSWORD:se}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false
spring.session.store-type=redis
spring.data.redis.host=${APP_SESSION_REDIS_HOST:redis}
spring.data.redis.port=${APP_SESSION_REDIS_PORT:6379}
spring.session.redis.namespace=practica5:session
server.servlet.session.timeout=30m

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

app.jwt.secret=${APP_JWT_SECRET:mock-password-con-muchos-caracteres-si-no-no-funciona}

