<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{list-proyect.title} + ' | Mocky'">Mocky | Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex">

<aside class="w-64 bg-slate-200 p-6 flex flex-col justify-between">

    <div>
        <h1 class="text-2xl font-bold text-slate-800 mb-8">
            Mocky
        </h1>

        <nav class="space-y-3">
            <a th:href="@{/projects}"
               class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300"
               th:text="#{menu.projects}">
                Projects
            </a>

            <a th:href="@{/mocks/new}"
               class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300"
               th:text="#{menu.newMock}">
                New Mock
            </a>
        </nav>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit"
                class="w-full bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600"
                th:text="#{menu.logout}">
            Log out
        </button>
    </form>
</aside>

<main class="flex-1 p-8 overflow-y-auto">

    <div class="bg-white rounded-xl shadow p-6 mb-8">
        <div class="flex justify-between items-start">

            <div>
                <h2 class="text-3xl font-bold text-slate-800"
                    th:text="${project.name}"></h2>

                <p class="text-slate-500 mt-2"
                   th:text="${project.description}"></p>

                <div class="mt-4 text-sm text-slate-600 space-y-1">
                    <p><b>ID:</b> <span th:text="${project.id}"></span></p>
                    <p>
                        <b th:text="#{form.project.label}">Owner</b>:
                        <span th:text="${project.owner.username}"></span>
                    </p>
                    <p>
                        <b th:text="#{menu.projects}">Total Mocks</b>:
                        <span th:text="${#lists.size(project.mocks)}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="space-y-6">

        <div th:if="${#lists.isEmpty(project.mocks)}"
             class="bg-white rounded-lg shadow p-6 text-slate-500 text-center"
             th:text="#{list-proyect.noMocks}">
            This project has no mocks
        </div>

        <div th:each="mock : ${project.mocks}"
             class="bg-white rounded-xl shadow p-6 space-y-5">

            <div class="flex justify-between items-start">

                <div>
                    <h3 class="text-xl font-bold text-slate-800"
                        th:text="${mock.name}"></h3>

                    <p class="text-slate-500 text-sm"
                       th:text="${mock.description}"></p>
                </div>

                <div class="text-xs text-slate-500 text-right">
                    <p><b>ID:</b> <span th:text="${mock.id}"></span></p>
                    <p>
                        <b th:text="#{form.project.label}">Owner</b>:
                        <span th:text="${mock.owner?.username}"></span>
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-4">

                <span th:switch="${mock.method}"
                      class="px-3 py-1 rounded text-xs font-bold">

                    <span th:case="'GET'" class="bg-green-200 text-green-800"
                          th:text="${mock.method}"></span>

                    <span th:case="'POST'" class="bg-blue-200 text-blue-800"
                          th:text="${mock.method}"></span>

                    <span th:case="'PUT'" class="bg-yellow-200 text-yellow-800"
                          th:text="${mock.method}"></span>

                    <span th:case="'DELETE'" class="bg-red-200 text-red-800"
                          th:text="${mock.method}"></span>

                    <span th:case="*" class="bg-purple-200 text-purple-800"
                          th:text="${mock.method}"></span>
                </span>

                <code class="text-slate-700 text-sm bg-slate-100 px-3 py-1 rounded"
                      th:text="'http://localhost:7001' + ${mock.path}"></code>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">

                <div>
                    <p class="text-slate-500">Status</p>
                    <p class="font-semibold text-slate-800"
                       th:text="${mock.statusCode}"></p>
                </div>

                <div>
                    <p class="text-slate-500">Content-Type</p>
                    <p class="font-semibold text-slate-800"
                       th:text="${mock.contentType}"></p>
                </div>

                <div>
                    <p class="text-slate-500">Delay</p>
                    <p class="font-semibold text-slate-800">
                        <span th:text="${mock.delaySeconds}"></span>
                        <span th:text="#{form.delay.placeholder}">seconds</span>
                    </p>
                </div>

                <div>
                    <p class="text-slate-500">JWT</p>
                    <p class="font-semibold"
                       th:classappend="${mock.jwtProtected} ? 'text-red-600' : 'text-green-600'"
                       th:text="${mock.jwtProtected} ? #{form.jwt.label} : 'Libre'">
                    </p>
                </div>
            </div>

            <div class="text-sm space-y-1">
                <p class="text-slate-500 font-semibold"
                   th:text="#{form.expiration.label}">
                    Expiration
                </p>

                <p th:if="${mock.expiresAt != null}">
                    <span th:text="${#temporals.format(mock.expiresAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
            </div>

            <div>
                <p class="text-slate-500 font-semibold mb-2"
                   th:text="#{form.headers.label}">
                    Headers
                </p>

                <div th:if="${#maps.isEmpty(mock.headers)}"
                     class="text-sm text-slate-400"
                     th:text="#{list-proyect.noMocks}">
                    No headers
                </div>

                <div th:each="entry : ${mock.headers}"
                     class="bg-slate-50 rounded px-3 py-2 text-sm flex justify-between">
                    <span class="font-semibold"
                          th:text="${entry.key}"></span>
                    <span th:text="${entry.value}" class="break-all whitespace-pre-wrap"></span>
                </div>
            </div>

            <div>
                <p class="text-slate-500 font-semibold mb-2"
                   th:text="#{form.response.body.label}">
                    Response Body
                </p>

                <pre class="bg-slate-900 text-green-300 text-xs rounded-lg p-4 overflow-x-auto"
                     th:text="${mock.responseBody}">
                </pre>
            </div>
        </div>
    </div>

</main>

<div class="fixed bottom-4 right-4 rounded-lg bg-slate-900 px-4 py-3 text-xs text-slate-100 shadow-lg">
    <p>Instancia: <span th:text="${instanceId}">n/a</span> | Puerto: <span th:text="${instancePort}">n/a</span></p>
    <p><a href="/session-info" class="text-emerald-300 hover:underline">Ver sesion activa</a></p>
</div>

</body>
</html>
