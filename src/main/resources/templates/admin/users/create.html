<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mocky | Nuevo Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex">

<!-- Sidebar izquierdo (igual que en list.html) -->
<aside class="w-64 bg-slate-200 p-6 flex flex-col justify-between">
    <div>
        <h1 class="text-2xl font-bold text-slate-800 mb-8">
            Mocky
        </h1>

        <nav class="space-y-3">
            <a th:href="@{/projects}" th:text="#{menu.projects}"
               class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300">
            </a>

            <a th:href="@{/mocks/new}" th:text="#{menu.newMock}"
               class="block px-4 py-2 rounded-lg text-slate-700 hover:bg-slate-300">
            </a>

            <a th:href="@{/admin/users-view}" th:text="#{menu.users}"
               class="block px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
            </a>
        </nav>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" th:text="#{menu.logout}"
                class="w-full bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
        </button>
    </form>
</aside>

<!-- Contenido principal -->
<main class="flex-1 p-8 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-slate-800">Crear Nuevo Usuario</h2>
        <a th:href="@{/admin/users-view}" 
           class="bg-slate-500 text-white px-4 py-2 rounded-lg hover:bg-slate-600 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            Volver
        </a>
    </div>

    <div class="bg-white rounded-lg shadow p-6 max-w-2xl">
        <form id="createForm">
            <!-- Username -->
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-slate-700 mb-2">
                    Nombre de usuario *
                </label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required 
                       minlength="3" 
                       maxlength="50"
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p class="text-sm text-slate-500 mt-1">Mínimo 3 caracteres, máximo 50.</p>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                    Contraseña *
                </label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required 
                       minlength="6"
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p class="text-sm text-slate-500 mt-1">Mínimo 6 caracteres.</p>
            </div>

            <!-- Roles -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-700 mb-2">
                    Roles
                </label>
                <div class="bg-slate-50 rounded-lg p-4 space-y-2">
                    <div th:each="role : ${roles}" class="flex items-center">
                        <input type="checkbox" 
                               th:name="'roleIds'" 
                               th:value="${role.id}" 
                               th:id="'role_' + ${role.id}"
                               class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded">
                        <label th:for="'role_' + ${role.id}" 
                               class="ml-3 text-sm text-slate-700">
                            <span th:text="${role.name}"></span>
                            <span th:if="${role.name == 'ADMIN'}" class="text-xs text-red-600 ml-2">(Acceso total)</span>
                            <span th:if="${role.name == 'USER'}" class="text-xs text-green-600 ml-2">(Acceso básico)</span>
                        </label>
                    </div>
                </div>
                <p class="text-sm text-slate-500 mt-1">Selecciona uno o más roles para el usuario.</p>
            </div>

            <!-- Info -->
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <p class="text-sm text-blue-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    Los campos marcados con * son obligatorios.
                </p>
            </div>

            <!-- Botones -->
            <div class="flex gap-3">
                <button type="submit" 
                        class="flex-1 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                    Crear Usuario
                </button>
                <a th:href="@{/admin/users-view}" 
                   class="flex-1 bg-slate-300 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-400 text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</main>

<script>
    document.getElementById('createForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let formData = new FormData(this);
        let roleIds = formData.getAll('roleIds').map(id => parseInt(id));
        
        let data = {
            username: formData.get('username'),
            password: formData.get('password'),
            roleIds: roleIds
        };
        
        fetch('/admin/users', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                window.location.href = '/admin/users-view';
            } else {
                return response.json().then(err => {
                    alert('Error: ' + (err.error || 'Error al crear usuario'));
                });
            }
        })
        .catch(error => {
            alert('Error de conexión: ' + error);
        });
    });
</script>

</body>
</html>
